<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HCA Group • Contact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --border:rgba(0,0,0,0.08);
      --shadow-soft: 0 6px 18px rgba(0,0,0,0.06);
      --radius:28px;
      --ease:cubic-bezier(0.22, 1, 0.36, 1);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",
                   Helvetica,Arial,"Inter",system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:28px 16px 36px;
    }

    .container{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      overflow:hidden;
      transform: translateY(10px);
      opacity:0;
      animation: fadeUp 900ms var(--ease) forwards;
    }

    .card:nth-child(1){ animation-delay: 60ms; }
    .card:nth-child(2){ animation-delay: 140ms; }
    .card:nth-child(3){ animation-delay: 220ms; }
    .footer{ animation-delay: 300ms; }

    @keyframes fadeUp{
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    .card-inner{ padding:18px 18px 16px; }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .hero-main{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
      flex:1;
    }

    .app-icon{
      width:56px;
      height:56px;
      border-radius:14px;
      background: linear-gradient(180deg, #fff, #f5f5f7);
      border:1px solid var(--border);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      display:grid;
      place-items:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .app-icon img{
      width:78%;
      height:78%;
      object-fit:contain;
    }

    .hero-title{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .hero-title h1{
      margin:0;
      font-size:18px;
      line-height:1.15;
      font-weight:700;
      letter-spacing:-0.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .save-icon-btn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,0.07);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,245,247,0.95));
      display:grid;
      place-items:center;
      flex:0 0 auto;
      box-shadow:
        0 8px 18px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.9);
      transition:
        transform 180ms var(--ease),
        background 180ms var(--ease),
        box-shadow 180ms var(--ease),
        border-color 180ms var(--ease);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .save-icon-btn:hover{
      transform: translateY(-1px);
      background: linear-gradient(180deg, #ffffff, #f7f7f9);
      box-shadow:
        0 10px 22px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,1);
    }

    .save-icon-btn:active{
      transform: scale(0.97);
    }

    .save-icon-btn svg{
      width:18px;
      height:18px;
      display:block;
    }

    .actions{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      padding:2px 0 0;
    }

    .btn{
      border:1px solid var(--border);
      background: rgba(245,245,247,0.7);
      border-radius:18px;
      padding:12px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      transition: transform 180ms var(--ease), background 180ms var(--ease), border-color 180ms var(--ease);
      user-select:none;
    }

    .btn:hover{
      transform: translateY(-1px);
      background: rgba(245,245,247,0.95);
    }

    .btn:active{
      transform: translateY(0px) scale(0.99);
    }

    .ico{
      width:34px;
      height:34px;
      border-radius:12px;
      display:grid;
      place-items:center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.10);
      flex:0 0 auto;
      color:#fff;
    }

    .ico svg{
      width:18px;
      height:18px;
      display:block;
    }

    .g-blue{ background: linear-gradient(135deg, #0a84ff, #0071e3); }
    .g-orange{ background: linear-gradient(135deg, #ff9f0a, #ff6a00); }
    .g-green{ background: linear-gradient(135deg, #34c759, #00a65a); }
    .g-gray{ background: linear-gradient(135deg, #8e8e93, #4d4d50); }
    .g-red{ background: linear-gradient(135deg, #ff453a, #ff2d55); }
    .g-ig{ background: linear-gradient(135deg, #ffcc00, #ff2d55, #5856d6); }

    .btn .txt{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .btn .txt .t{
      font-size:13.5px;
      font-weight:700;
      letter-spacing:-0.01em;
    }

    .btn .txt .s{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .location-head{
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-bottom:14px;
    }

    .location-head h2{
      margin:0;
      font-size:17px;
      line-height:1.2;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .location-head p{
      margin:0;
      font-size:13px;
      color:var(--muted);
    }

    .location-box{
      display:flex;
      gap:12px;
      align-items:center;
      padding:14px;
      border:1px solid var(--border);
      border-radius:20px;
      background:rgba(245,245,247,0.72);
    }

    .location-link{
      text-decoration:none;
      transition: transform 180ms var(--ease), background 180ms var(--ease), border-color 180ms var(--ease);
    }

    .location-link:hover{
      transform: translateY(-1px);
      background: rgba(245,245,247,0.95);
    }

    .location-link:active{
      transform: scale(0.99);
    }

    .location-icon{
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background: linear-gradient(135deg, #0a84ff, #0071e3);
      box-shadow: 0 10px 20px rgba(0,0,0,0.10);
      flex:0 0 auto;
    }

    .location-icon svg{
      width:20px;
      height:20px;
      display:block;
    }

    .location-text{
      min-width:0;
      flex:1;
    }

    .location-title{
      font-size:14px;
      font-weight:700;
      margin-bottom:4px;
      letter-spacing:-0.01em;
    }

    .location-subtitle{
      font-size:13px;
      line-height:1.4;
      color:var(--muted);
    }

    .location-arrow{
      width:20px;
      height:20px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
    }

    .location-arrow svg{
      width:18px;
      height:18px;
      display:block;
    }

    .footer{
      text-align:center;
      color:rgba(110,110,115,0.95);
      font-size:12px;
      padding:10px 6px 0;
      transform: translateY(10px);
      opacity:0;
      animation: fadeUp 900ms var(--ease) forwards;
    }

    @media (max-width: 360px){
      .actions{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <main class="container">

      <!-- HERO -->

        <div class="card-inner hero">

            <div class="app-icon">

      <!-- BUTTONS -->
      <section class="card">
        <div class="card-inner">
          <div class="actions">

            <a class="btn" href="https://wa.me/918860086712" target="_blank" rel="noopener">
              <div class="ico g-green" aria-hidden="true">

            </a>

            <a class="btn" href="tel:+919350513789">
              <div class="ico g-gray" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">

            <a class="btn" href="mailto:enquiry@grouphca.com">

                  <path d="M4 6h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z" stroke="white" stroke-width="2"/>
                  <path d="m22 8-10 7L2 8" stroke="white" stroke-width="2" opacity=".95"/>
                </svg>

              <div class="txt">
                <div class="t">Email</div>

      <!-- LOCATION -->

          <a

      <footer class="footer">
        © 2026 HCA Group · All rights reserved
      </footer>

    </main>
  </div>

  <script>
    document.querySelectorAll('.save-contact-trigger').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.preventDefault();

        const vcard = [
          'BEGIN:VCARD',
          'VERSION:3.0',
          'N:Sharma;Avnish Kumar;;;',
          'FN:Avnish Kumar Sharma',
          'ORG:Hari Chand Anand & Co.',
          'TITLE:Sales lead',
          'TEL;TYPE=WORK,CELL:+919350513789',
          'EMAIL;TYPE=INTERNET:sales3@grouphca.com',
          'URL:https://www.grouphca.com/',
          'ADR;TYPE=WORK:;;A-94/1\\, Pocket D\\, Phase II\\, Okhla Industrial Estate;New Delhi;Delhi;110020;India',
          'NOTE:Head Office',
          'END:VCARD'
        ].join('\r\n');

        const blob = new Blob([vcard + '\r\n'], { type: 'text/vcard;charset=utf-8' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'avnish-kumar-sharma-contact.vcf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 1000);
      });
    });
  </script>
</body>
</html>
